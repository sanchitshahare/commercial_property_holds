<!-- INVESTMENT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Invest in Property</div>
      <button class="modal-close" type="button" aria-label="Close investment modal" onclick="closeModal()">×</button>
    </div>
    <div class="modal-summary">
      <div class="modal-location" id="modalLoc"></div>
      <div class="modal-meta">
        <div class="modal-meta-item"><div class="modal-meta-label">Property Value</div><div class="modal-meta-value" id="modalVal"></div></div>
        <div class="modal-meta-item"><div class="modal-meta-label">Target IRR</div><div class="modal-meta-value modal-meta-value-accent" id="modalIrr"></div></div>
      </div>
    </div>
    <div class="form-group">
      <label>Investment Amount (₹)</label>
      <input type="number" id="modalAmount" placeholder="5000" min="5000" step="1000" oninput="calcShares()">
    </div>
    <div class="modal-estimates">
      <div><div class="modal-estimate-label">Shares You'll Receive</div><div class="modal-estimate-value modal-estimate-value-accent" id="sharesOut">—</div></div>
      <div><div class="modal-estimate-label">Est. Annual Income</div><div class="modal-estimate-value" id="incomeOut">—</div></div>
    </div>
    <button class="btn-primary modal-action" type="button" onclick="closeModal()">Proceed to KYC & Payment →</button>
    <p class="modal-note">Regulated by SEBI · Funds held in escrow · 100% secure</p>
  </div>
</div>

<div class="alert-modal" id="alertModal" aria-hidden="true" role="alertdialog" aria-labelledby="alertTitle">
  <div class="alert-modal-card">
    <div class="alert-modal-header">
      <div class="alert-modal-title" id="alertTitle">Contact Request</div>
      <button class="alert-modal-close close" type="button" aria-label="Close contact alert" onclick="closeAlertModal()">×</button>
    </div>
    <p class="alert-modal-message" id="alertMessage"></p>
    <button class="btn-primary alert-modal-action" type="button" onclick="closeAlertModal()">Close</button>
  </div>
</div>
